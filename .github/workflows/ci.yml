name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate capability batch manifest
        run: |
          uaek capability batch benchmarks/manifests/capability-batch.ci-example.json \
            --dry-run \
            --output /tmp/uaek-capability-manifest-validation.json

      - name: Lint
        run: python -m ruff check src api mcp tests

      - name: Typecheck
        run: python -m mypy src api mcp

      - name: Test
        run: python -m pytest

      - name: Core coverage
        run: python -m pytest --cov=src --cov-report=term

      - name: Product interface coverage
        run: python -m pytest --cov=src --cov=api --cov=mcp --cov-report=term-missing

  release-gate:
    name: Release gate (wheel + install + smoke)
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --outdir dist/

      - name: Install wheel in clean venv
        run: |
          python -m venv /tmp/release-venv
          /tmp/release-venv/bin/pip install dist/uaek-0.1.0-*.whl

      - name: CLI smoke test
        run: |
          /tmp/release-venv/bin/uaek --version
          /tmp/release-venv/bin/uaek --help

      - name: API and MCP smoke test
        run: |
          /tmp/release-venv/bin/python - <<'PY'
          import api.server
          import mcp.server
          PY
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            '{"jsonrpc":"2.0","id":3,"method":"shutdown","params":{}}' \
            | /tmp/release-venv/bin/python -m mcp.server \
            > /tmp/release-mcp-responses.jsonl
          /tmp/release-venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          responses = [
              json.loads(line)
              for line in Path("/tmp/release-mcp-responses.jsonl").read_text().splitlines()
              if line.strip()
          ]
          assert responses[0]["result"]["serverInfo"]["name"] == "uaek"
          tools = {tool["name"] for tool in responses[1]["result"]["tools"]}
          assert {"uaek_verify", "uaek_effort", "uaek_memory_query"}.issubset(tools)
          PY

      - name: Benchmark quick (from wheel)
        run: |
          /tmp/release-venv/bin/uaek benchmark --suite quick --iterations 1 \
            --output /tmp/release-benchmarks

      - name: Benchmark adversarial (from wheel)
        run: |
          /tmp/release-venv/bin/uaek benchmark --suite adversarial --iterations 1 \
            --output /tmp/release-benchmarks

      - name: Capability manifest dry-run (from wheel)
        run: |
          /tmp/release-venv/bin/uaek capability batch \
            benchmarks/manifests/capability-batch.ci-example.json \
            --dry-run \
            --output /tmp/release-benchmarks/manifest-validation.json

      - name: Audit (from wheel)
        run: |
          /tmp/release-venv/bin/uaek audit --iterations 1 \
            --output /tmp/release-benchmarks

      - name: Validate audit semantics
        run: |
          /tmp/release-venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          audit = json.loads(Path("/tmp/release-benchmarks/audit.json").read_text())
          assert audit["errors"] == [], audit["errors"]
          assert audit["gates"]["audit_passed"] is True, audit["gates"]
          for key, proposition in audit["propositions"].items():
              if key == "all_propositions_complete":
                  continue
              assert proposition["status"] != "incomplete", (key, proposition)
          PY

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-evidence
          path: /tmp/release-benchmarks/
          retention-days: 90

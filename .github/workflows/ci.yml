name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate capability batch manifest
        run: |
          uaek capability batch benchmarks/manifests/capability-batch.ci-example.json \
            --dry-run \
            --output /tmp/uaek-capability-manifest-validation.json

      - name: Lint
        run: python -m ruff check src api mcp tests

      - name: Typecheck
        run: python -m mypy src api mcp

      - name: Test
        run: python -m pytest

      - name: Core coverage
        run: python -m pytest --cov=src --cov-report=term

      - name: Product interface coverage
        run: python -m pytest --cov=src --cov=api --cov=mcp --cov-report=term-missing

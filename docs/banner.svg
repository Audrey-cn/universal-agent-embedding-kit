<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="UAEK — Universal Agent Embedding Kit">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <text x="72" y="120" fill="#f8fafc" font-size="76" font-weight="700" letter-spacing="2">UAEK</text>
    <text x="74" y="166" fill="#cbd5e1" font-size="27" font-weight="500">Universal Agent Embedding Kit</text>
    <text x="74" y="212" fill="#7dd3fc" font-size="20" font-weight="400">Evidence that survives an attack — not numbers that look good.</text>
    <text x="74" y="250" fill="#64748b" font-size="16" font-weight="400">model-agnostic · embeddable · red-teamed · honest by design</text>
  </g>
  <g transform="translate(880,70)" aria-hidden="true">
    <text x="118" y="-14" fill="#475569" font-size="14" text-anchor="end" font-family="ui-sans-serif, Segoe UI, Arial">evidence ladder</text>
    <rect x="0"   y="150" width="34" height="20"  rx="3" fill="url(#accent)" opacity="0.40"/>
    <rect x="46"  y="120" width="34" height="50"  rx="3" fill="url(#accent)" opacity="0.55"/>
    <rect x="92"  y="86"  width="34" height="84"  rx="3" fill="url(#accent)" opacity="0.70"/>
    <rect x="138" y="48"  width="34" height="122" rx="3" fill="url(#accent)" opacity="0.85"/>
    <rect x="184" y="6"   width="34" height="164" rx="3" fill="url(#accent)"/>
    <g fill="#0b1020" font-size="14" font-weight="700" text-anchor="middle" font-family="ui-sans-serif, Arial">
      <text x="17" y="165">1</text>
      <text x="63" y="165">2</text>
      <text x="109" y="165">3</text>
      <text x="155" y="165">4</text>
      <text x="201" y="165">5</text>
    </g>
  </g>
</svg>
